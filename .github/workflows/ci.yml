name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Run flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 axle/ tools/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 axle/ tools/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Run black --check
      run: |
        black --check axle/ tools/

    - name: Run isort --check
      run: |
        isort --check-only axle/ tools/

  test-install:
    name: Test Installation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install package
      run: |
        pip install -e .

    - name: Run axle list
      run: |
        axle list

    - name: Run axle doctor
      run: |
        axle doctor

    - name: Run axle help
      run: |
        axle help

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Run pip-audit
      run: |
        pip-audit --desc
      continue-on-error: true

    - name: Check for secrets
      run: |
        # Basic check for common secret patterns
        if grep -r "api_key\|apikey\|secret.*=\|password.*=" axle/ tools/ --include="*.py" | grep -v "def\|#\|\""; then
          echo "Warning: Possible secrets found in code"
          exit 1
        fi
      continue-on-error: true
